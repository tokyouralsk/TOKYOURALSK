<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>TOKYO Проверка купона</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding-top:120px;
}

.box{
background:white;
width:360px;
margin:auto;
padding:40px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-top:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
font-size:18px;
margin-top:15px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

#result{
margin-top:25px;
font-size:18px;
text-align:left;
white-space:normal;
}

</style>

</head>

<body>

<div class="box">

<h2>Проверить купон</h2>

<input id="coupon" placeholder="Введите номер купона">

<button onclick="checkCoupon()">Открыть приз</button>

<div id="result"></div>

</div>

<script>

function checkCoupon(){

var code=document.getElementById("coupon").value;

if(code==""){
document.getElementById("result").innerHTML="Введите купон";
return;
}

var url="ВСТАВЬ_URL_СКРИПТА?coupon="+code;

fetch(url)

.then(response=>response.text())

.then(data=>{

document.getElementById("result").innerHTML=data.replace(/\n/g,"<br>");

})

.catch(error=>{

document.getElementById("result").innerHTML="Ошибка проверки";

});

}

</script>

</body>

</html>
