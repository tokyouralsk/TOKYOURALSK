<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>TOKYO Купон</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
text-align:center;
padding-top:120px;
}

.box{
background:white;
width:340px;
margin:auto;
padding:40px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-top:15px;
}

button{
width:100%;
padding:14px;
font-size:18px;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>Проверить купон</h2>

<input id="coupon" placeholder="TOKYO-JH-92348Q">

<button onclick="checkCoupon()">Открыть приз</button>

<div id="result"></div>

</div>

<script>

function checkCoupon(){

var code=document.getElementById("coupon").value;

var url="ВСТАВЬ_ССЫЛКУ_СКРИПТА?coupon="+code;

fetch(url)
.then(response=>response.text())
.then(data=>{

document.getElementById("result").innerText=data;

});

}

</script>

</body>
</html>
